<aside class="w-64 bg-gray-900 text-gray-300 shrink-0">
        <div class="p-6 border-b border-gray-700">
            <p class="text-xs uppercase tracking-wider text-gray-500">Welcome</p>
            <p class="text-white font-bold text-lg mt-1 truncate">{{ user.username }}</p>
        </div>
        <nav class="p-4 space-y-1">
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium  transition {% if request.resolver_match.url_name == 'dashboard' %}bg-brand text-white hover:bg-brand-dark{% else %} hover:bg-gray-800 hover:text-white{% endif %}">
                Dashboard
            </a>
            {% if perms.auth.view_user %}
            <a href="{% url 'users' %}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium  transition {% if request.resolver_match.url_name in 'users|add_user|edit_user' %}bg-brand text-white hover:bg-brand-dark {% else %} hover:bg-gray-800 hover:text-white {% endif %}">
                Users
            </a>
            {% endif %}
            <a  href="{% url 'categories' %}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium  transition {% if request.resolver_match.url_name in 'categories|add_category|edit_category' %}bg-brand text-white hover:bg-brand-dark {% else %} hover:bg-gray-800 hover:text-white {% endif %}">
               Categories
            </a>
            <a href="{% url 'posts' %}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium  transition {% if request.resolver_match.url_name in 'posts|add_post|edit_post' %}bg-brand text-white hover:bg-brand-dark {% else %} hover:bg-gray-800 hover:text-white {% endif %}">
               Posts
            </a>
            <a href="{% url 'logout' %}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-red-400 hover:bg-red-500/10 hover:text-red-300 transition mt-6">
                Logout
            </a>
        </nav>
</aside>
