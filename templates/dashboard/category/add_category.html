{% extends 'base.html' %}

{% block content %}
    <div class="flex min-h-[calc(100vh-180px)]">
        {% include 'dashboard/side-bar.html' %}
        <div class="flex-1 bg-gray-50 p-8 overflow-y-auto">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-8">Add Category</h1>
            <form method="post" action="{% url 'add_category' %}" class="bg-white rounded-xl shadow-sm p-6">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="category_name" class="block text-sm font-medium text-gray-700">Category Name</label>
                    <input type="text" id="category_name" name="category_name" class="mt-3 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-brand focus:border-brand">
                </div>
                <button type="submit" class="px-4 py-2 bg-brand text-white rounded-lg hover:bg-brand-dark transition">Add Category</button>
            </form>
        </div>
    </div>
{% endblock %}
