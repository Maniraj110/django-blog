{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
        <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-8">Create an Account</h2>
        <form action="{% url 'register' %}" method="POST" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-gray-600 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="mt-1">
                    {% for error in field.errors %}
                    <p class="text-red-500 text-xs">{{ error }}</p>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit"
                    class="w-full py-3 bg-brand text-white font-bold rounded-lg hover:bg-brand-dark transition shadow-md">Register</button>
        </form>
        <p class="text-center text-sm text-gray-400 mt-6">Already have an account? <a href="{% url 'login' %}" class="text-brand hover:underline font-medium">Login</a></p>
    </div>
</div>
{% endblock %}
